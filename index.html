<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Code Puzzle Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
      background-size: 800% 800%;
      animation: gradientShift 18s ease infinite;
      color: #333;
      text-align: center;
      padding: 50px 20px;
      margin: 0;
    }

    @keyframes gradientShift {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      color: #222;
    }

    .description {
      font-size: 1.2rem;
      color: #444;
      margin-bottom: 40px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 400px;
      margin: 0 auto;
    }

    .menu-btn {
      text-decoration: none;
      background: #4CAF50;
      color: white;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      transition: all 0.3s ease;
      position: relative;
    }

    .menu-btn:hover {
      background: #388e3c;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .menu-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .menu-btn:hover::after {
      opacity: 1;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }
      .menu-btn {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>🎨 Color Code Puzzle Game</h1>
  <p class="description">Test your color knowledge by guessing hex codes, identifying colors, or mixing your own!</p>

  <div class="menu">
    <a href="guess-hex.html" class="menu-btn" data-tooltip="See a color and guess its 6-digit HEX code!">🎯 Guess the Hex Code</a>
    <a href="guess-color.html" class="menu-btn" data-tooltip="See a HEX code and choose the right color from similar options!">🔍 Guess the Color</a>
    <a href="mix-colors.html" class="menu-btn" data-tooltip="Mix red, blue, yellow to match the target color!">🧪 Mix Colors</a>
  </div>
</body>
</html>
